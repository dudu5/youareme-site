<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collaborate — You Are Me</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #00c9a7;
    --accent-border: rgba(0,201,167,0.5);
    --accent-bg: rgba(0,201,167,0.08);
    --bg: #0a0a0a;
    --bg-overlay: rgba(0,0,0,0.96);
    --white: #f0f0f0;
    --text-hi: rgba(255,255,255,0.9);
    --text-mid: rgba(255,255,255,0.55);
    --dim: rgba(255,255,255,0.55);
    --text-low: rgba(255,255,255,0.3);
    --dimmer: rgba(255,255,255,0.2);
    --line: rgba(255,255,255,0.5);
    --border: rgba(255,255,255,0.08);
    --border-light: rgba(255,255,255,0.12);
    --surface: rgba(255,255,255,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--white);
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .bg-fixed {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--bg-overlay), var(--bg-overlay)),
      url('ground_background.webp');
    background-size: cover;
    background-position: center;
    z-index: 0;
  }

  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 16px 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 100;
  }

  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--white);
    text-decoration: none;
  }

  .nav-logo span { color: var(--accent); }

  .content {
    position: relative;
    z-index: 1;
    flex: 1;
  }

  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    pointer-events: none;
    padding: 8px 36px;
    background: linear-gradient(transparent 0%, var(--bg) 100%);
    max-height: 80px;
  }

  .bottom-center {
    text-align: center;
  }

  .bottom-logo {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.08em;
  }

  .bottom-tagline {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: var(--text-low);
    letter-spacing: 0.06em;
  }

  .bottom-dice {
    pointer-events: auto;
    position: absolute;
    left: 36px;
    bottom: 20px;
    font-size: 32px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: transform 0.3s;
  }

  .bottom-dice:active { transform: rotate(180deg); }

  .bottom-tryit {
    pointer-events: auto;
    position: absolute;
    right: 36px;
    bottom: 24px;
    text-decoration: none;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--accent);
    transition: opacity 0.2s;
  }

  .bottom-tryit:hover { opacity: 0.7; }

  @media (max-width: 768px) {
    nav { padding: 14px 22px; }
    .bottom-bar { padding: 8px 22px; }
    .bottom-logo { font-size: 14px !important; }
    .bottom-tagline { font-size: 9px !important; }
    .bottom-dice { left: 16px !important; font-size: 24px !important; }
    .bottom-tryit { right: 16px !important; font-size: 11px !important; }
  }
</style>
</head>
<body>

<div class="bg-fixed"></div>

<nav>
  <a href="new-lp.html" class="nav-logo">You Are <span>Me</span></a>
</nav>

<div class="content" style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
  <p style="font-family:'Cormorant Garamond',Georgia,serif; font-size:clamp(24px, 4vw, 40px); font-weight:300; color:var(--text-mid);">Coming soon.</p>
</div>

<div class="bottom-bar">
  <div class="bottom-center">
    <span class="bottom-logo">signalforge</span><br>
    <span class="bottom-tagline">Fewer words. More you. Real connection.</span>
  </div>
  <span class="bottom-dice" onclick="randomTheme()">🎲</span>
  <a class="bottom-tryit" href="https://signalforge.youareme.one/" style="font-size:32px;">🚪</a>
</div>

<script src="theme.js"></script>
</body>
</html>
