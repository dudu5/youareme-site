<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collaborate — You Are Me</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #00c9a7;
    --white: #ffffff;
    --dim: rgba(255,255,255,0.52);
    --dimmer: rgba(255,255,255,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--white);
    background: #0a0a0a;
  }

  .bg-fixed {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.96), rgba(0,0,0,0.96)),
      url('ground_background.webp');
    background-size: cover;
    background-position: center;
    z-index: 0;
  }

  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 16px 36px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(8px);
    z-index: 100;
  }

  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--white);
    text-decoration: none;
  }

  .nav-logo span { color: var(--accent); }

  @media (max-width: 768px) {
    nav { padding: 14px 22px; }
  }
</style>
</head>
<body>

<div class="bg-fixed"></div>
<nav>
  <a href="new-lp.html" class="nav-logo">You Are <span>Me</span></a>
  <div style="display:flex; align-items:center; gap:16px;">
    <div style="display:flex; flex-direction:column; align-items:flex-end; pointer-events:none;">
      <span style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:12px; font-weight:400; color:rgba(255,255,255,0.35); letter-spacing:0.06em;">Fewer words. More you. Real connection.</span>
      <span style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:28px; font-weight:600; color:#00c9a7; letter-spacing:0.08em;">signal</span>
    </div>
  </div>
</nav>

</body>
</html>
