<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collaborate — You Are Me</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #00c9a7;
    --accent-border: rgba(0,201,167,0.5);
    --accent-bg: rgba(0,201,167,0.08);
    --bg: #0a0a0a;
    --bg-overlay: rgba(0,0,0,0.96);
    --white: #f0f0f0;
    --text-hi: rgba(255,255,255,0.9);
    --text-mid: rgba(255,255,255,0.55);
    --dim: rgba(255,255,255,0.55);
    --text-low: rgba(255,255,255,0.3);
    --dimmer: rgba(255,255,255,0.2);
    --line: rgba(255,255,255,0.5);
    --border: rgba(255,255,255,0.08);
    --border-light: rgba(255,255,255,0.12);
    --surface: rgba(255,255,255,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--white);
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .bg-fixed {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--bg-overlay), var(--bg-overlay)),
      url('ground_background.webp');
    background-size: cover;
    background-position: center;
    z-index: 0;
  }

  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 16px 36px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    background: var(--bg);
    z-index: 100;
  }

  .nav-cta {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .nav-cta:hover { opacity: 0.7; }

  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--white);
    text-decoration: none;
  }

  .nav-logo span { color: var(--accent); }

  .content {
    position: relative;
    z-index: 1;
    flex: 1;
  }

  @media (max-width: 768px) {
    nav { padding: 14px 22px; }
  }
</style>
</head>
<body>

<div class="bg-fixed"></div>

<nav>
  <a href="index.html" class="nav-logo">You Are <span>Me</span></a>
  <a href="index.html#assessmentSection" class="nav-cta">Get your map →</a>
</nav>

<div class="content" style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
  <div style="text-align:center;">
    <p style="font-family:'Cormorant Garamond',Georgia,serif; font-size:clamp(24px, 4vw, 40px); font-weight:300; color:var(--text-mid);">Coming soon.</p>
    <p style="font-family:'DM Sans',sans-serif; font-size:15px; font-weight:300; color:var(--dim); margin-top:32px;">📧 a.gassowski@gmail.com</p>
    <p style="font-family:'DM Sans',sans-serif; font-size:15px; font-weight:300; color:var(--dim); margin-top:8px;">☎️ +48 734 451 297</p>
  </div>
</div>

</body>
</html>
